name: aa1_estate_portfolio
description: AA1 Estate Portfolio — Flutter scaffold and design exports (uk.co.aaholdestate.portfolio).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/generated/
    - design/exports/screens/
    - design/exports/screens/by_slug/
